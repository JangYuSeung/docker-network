services:
  # 1. Database 서비스 (MySQL)
  service-board-mysql:
    image: mysql:8.0-board-local
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: mysql-primary-container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${MYSQL_TZ:-Asia/Seoul}
    ports:
      - "3306:3306"
    networks:
      - board-network

  # 2. Application 서비스 (FastAPI)
  service-board-fastapi:
    image: fastapi:board-proxy-local
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: board-fastapi-container
    restart: always
    depends_on:
      - service-board-mysql
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    ports:
      - "8000:8000"
    networks:
      - board-network

  # 3. Web 서비스 (Nginx)
  service-board-nginx:
    image: nginx:board-local
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: board-nginx-container
    restart: always
    depends_on:
      - service-board-fastapi
    ports:
      - "80:80"
    networks:
      - board-network

networks:
  board-network:
    driver: bridge
