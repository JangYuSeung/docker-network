services:
  # 1. Database 서비스 (MySQL)
  service-board-mysql:
    image: mysql:8.0-board-local
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: mysql-primary-container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "ian1234!"
      MYSQL_DATABASE: "iandb"
      MYSQL_USER: "ian"
      MYSQL_PASSWORD: "ian1234!"
      TZ: "Asia/Seoul"
    ports:
      - "3306:3306"
    networks:
      - board-network

  # 2. Application 서비스 (FastAPI)
  service-board-fastapi:
    image: fastapi:board-proxy-local
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: board-fastapi-container
    restart: always
    depends_on:
      - service-board-mysql
    environment:
      DB_HOST: "mysql-primary-container"
      DB_USER: "dev"
      DB_PASSWORD: "dev1234!"
      DB_NAME: "iandb"
    ports:
      - "8000:8000"
    networks:
      - board-network

  # 3. Web 서비스 (Nginx)
  service-board-nginx:
    image: nginx:board-local
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: board-nginx-container
    restart: always
    depends_on:
      - service-board-fastapi
    ports:
      - "80:80"
    networks:
      - board-network

networks:
  board-network:
    driver: bridge
